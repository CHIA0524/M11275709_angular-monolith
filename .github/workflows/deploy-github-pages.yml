name: Deploy Angular Monolith to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - src/**
      - public/**
      - angular.json
      - package.json
      - package-lock.json
      - tsconfig.app.json
      - tsconfig.json
      - tsconfig.spec.json
      - .github/workflows/deploy-github-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY_OWNER}"

          if [ "$REPO_NAME" = "$OWNER_NAME.github.io" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPO_NAME/"
          fi

          npx ng build --configuration production --base-href "$BASE_HREF"

      - name: Prepare Pages artifact
        shell: bash
        run: |
          cp dist/angular-monolith/browser/index.html dist/angular-monolith/browser/404.html
          touch dist/angular-monolith/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/angular-monolith/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
