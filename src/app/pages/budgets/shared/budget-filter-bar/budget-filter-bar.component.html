<form class="filter-bar" [formGroup]="filterForm">
  <mat-form-field appearance="outline">
    <mat-label>搜尋預算</mat-label>
    <input matInput formControlName="keyword" placeholder="輸入類別或關鍵字" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>負責人</mat-label>
    <mat-select formControlName="owner">
      <mat-option value="all">全部</mat-option>
      @for (owner of owners(); track owner) {
      <mat-option [value]="owner">{{ owner }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>狀態</mat-label>
    <mat-select formControlName="status">
      @for (status of statuses(); track status) {
      <mat-option [value]="status">{{ status }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <button mat-stroked-button type="button" (click)="resetFilters()">
    清除條件
  </button>
</form>
