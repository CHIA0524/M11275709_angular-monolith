<mat-card>
  <mat-card-header>
    <mat-card-title>帳目列表</mat-card-title>
    <mat-card-subtitle>查看、編輯或刪除您所有的記帳紀錄</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <div class="table-container">
      <table mat-table [dataSource]="transactions$" class="mat-elevation-z8">
        <!-- Date Column -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>日期</th>
          <td mat-cell *matCellDef="let element">
            {{ element.date | date : "yyyy/MM/dd" }}
          </td>
        </ng-container>

        <!-- Type Column -->
        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef>類型</th>
          <td
            mat-cell
            *matCellDef="let element"
            [ngClass]="{
              'income-text': element.type === 'income',
              'expense-text': element.type === 'expense'
            }"
          >
            {{ element.type === "income" ? "收入" : "支出" }}
          </td>
        </ng-container>

        <!-- Category Column -->
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>分類</th>
          <td mat-cell *matCellDef="let element">{{ element.category }}</td>
        </ng-container>

        <!-- Amount Column -->
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef>金額</th>
          <td
            mat-cell
            *matCellDef="let element"
            [ngClass]="{
              'income-text': element.type === 'income',
              'expense-text': element.type === 'expense'
            }"
          >
            {{ element.amount | number }}
          </td>
        </ng-container>

        <!-- Currency Column -->
        <ng-container matColumnDef="currency">
          <th mat-header-cell *matHeaderCellDef>幣別</th>
          <td mat-cell *matCellDef="let element">
            {{ element.currency }}
          </td>
        </ng-container>

        <!-- Notes Column -->
        <ng-container matColumnDef="notes">
          <th mat-header-cell *matHeaderCellDef>備註</th>
          <td mat-cell *matCellDef="let element">{{ element.notes || "-" }}</td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let transaction">
            <button mat-icon-button (click)="editTransaction(transaction.id)">
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              (click)="deleteTransaction(transaction.id)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <!-- Row shown when there is no data. -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" [attr.colspan]="displayedColumns.length">
            還沒有任何記帳紀錄。
          </td>
        </tr>
      </table>
    </div>
    <div class="add-button-container">
      <button
        mat-fab
        color="primary"
        aria-label="Add transaction"
        (click)="addTransaction()"
      >
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </mat-card-content>
</mat-card>
