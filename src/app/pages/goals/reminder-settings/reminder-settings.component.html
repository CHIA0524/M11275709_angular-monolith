<section class="page-shell">
  <div class="page-header">
    <div>
      <p class="eyebrow">Reminder Rules</p>
      <h1>帳單提醒設定</h1>
      <p class="subtitle">提醒設定讓這個系統不只看報表，也開始處理行為規則。</p>
    </div>
    <div class="header-actions">
      <a mat-stroked-button routerLink="/goals">回目標列表</a>
      <a mat-flat-button routerLink="/goals/notifications">前往通知中心</a>
    </div>
  </div>

  <div class="content-grid">
    <mat-card class="panel">
      <h2>新增提醒規則</h2>
      <form [formGroup]="reminderForm" class="reminder-form">
        <mat-form-field appearance="outline">
          <mat-label>規則名稱</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>通知管道</mat-label>
          <mat-select formControlName="channel">
            <mat-option value="app">App</mat-option>
            <mat-option value="email">Email</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>頻率</mat-label>
          <input matInput formControlName="cadence" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>適用範圍</mat-label>
          <input matInput formControlName="scope" />
        </mat-form-field>

        <button mat-flat-button type="button">新增規則</button>
      </form>
    </mat-card>

    @if (rules$ | async; as rules) {
    <mat-card class="panel">
      <h2>既有規則</h2>
      <table mat-table [dataSource]="rules" class="rule-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>名稱</th>
          <td mat-cell *matCellDef="let rule">{{ rule.name }}</td>
        </ng-container>

        <ng-container matColumnDef="channel">
          <th mat-header-cell *matHeaderCellDef>管道</th>
          <td mat-cell *matCellDef="let rule">{{ rule.channel }}</td>
        </ng-container>

        <ng-container matColumnDef="cadence">
          <th mat-header-cell *matHeaderCellDef>頻率</th>
          <td mat-cell *matCellDef="let rule">{{ rule.cadence }}</td>
        </ng-container>

        <ng-container matColumnDef="scope">
          <th mat-header-cell *matHeaderCellDef>範圍</th>
          <td mat-cell *matCellDef="let rule">{{ rule.scope }}</td>
        </ng-container>

        <ng-container matColumnDef="enabled">
          <th mat-header-cell *matHeaderCellDef>啟用</th>
          <td mat-cell *matCellDef="let rule">
            <mat-slide-toggle
              [checked]="rule.enabled"
              disabled
            ></mat-slide-toggle>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>
    }
  </div>
</section>
