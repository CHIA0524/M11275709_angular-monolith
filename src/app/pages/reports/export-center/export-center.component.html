<section class="page-shell">
  <div class="page-header">
    <div>
      <p class="eyebrow">Export Workflow</p>
      <h1>可匯出報表頁</h1>
      <p class="subtitle">
        匯出中心會自然帶出工作狀態、歷程與更多後端互動介面。
      </p>
    </div>
    <div class="header-actions">
      <a mat-stroked-button routerLink="/reports">回報表中心</a>
    </div>
  </div>

  @if (jobs$ | async; as jobs) {
  <mat-card class="panel">
    <table mat-table [dataSource]="jobs" class="job-table">
      <ng-container matColumnDef="reportName">
        <th mat-header-cell *matHeaderCellDef>報表</th>
        <td mat-cell *matCellDef="let job">{{ job.reportName }}</td>
      </ng-container>

      <ng-container matColumnDef="format">
        <th mat-header-cell *matHeaderCellDef>格式</th>
        <td mat-cell *matCellDef="let job">{{ job.format }}</td>
      </ng-container>

      <ng-container matColumnDef="requestedBy">
        <th mat-header-cell *matHeaderCellDef>申請人</th>
        <td mat-cell *matCellDef="let job">{{ job.requestedBy }}</td>
      </ng-container>

      <ng-container matColumnDef="generatedAt">
        <th mat-header-cell *matHeaderCellDef>時間</th>
        <td mat-cell *matCellDef="let job">{{ job.generatedAt }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>狀態</th>
        <td mat-cell *matCellDef="let job">
          <span class="status-chip" [ngClass]="job.status">{{
            job.status
          }}</span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
  }
</section>
